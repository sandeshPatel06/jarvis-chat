# Docker Compose configuration for Jarvis Chat

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME:-jarvis}
      - POSTGRES_USER=${DB_USER:-jarvis_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-jarvis_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${DB_USER:-jarvis_user} -d $${DB_NAME:-jarvis}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./jarvis-backend
    ports:
      - "8000:8000"
    volumes:
      - ./jarvis-backend:/app
      - ./jarvis-backend/media:/app/media
      - ./jarvis-backend/staticfiles:/app/staticfiles
    env_file:
      - .env.production
    environment:
      - DATABASE_URL=postgres://${DB_USER:-jarvis_user}:${DB_PASSWORD:-jarvis_password}@db:5432/${DB_NAME:-jarvis}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-True}
      - DJANGO_SECURE_SSL_REDIRECT=${DJANGO_SECURE_SSL_REDIRECT:-False}
    depends_on:
      db:
        condition: service_healthy

  app:
    build:
      context: ./jarvis-app
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
