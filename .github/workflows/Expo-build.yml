name: Expo Build & Email Notification

on:
  push:
    branches:
      - main
    paths:
      - 'jarvis-app/**'
  pull_request:
    paths:
      - 'jarvis-app/**'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: jarvis-app

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: jarvis-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Expo & EAS
        run: npm install -g expo-cli eas-cli

      - name: Setup EAS Project Connection
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          # Check current user
          npx eas-cli whoami
          # Remove hardcoded IDs that cause "Entity not authorized" errors in CI
          # This allows the build to link to the account associated with the current EXPO_TOKEN
          jq 'del(.expo.extra.eas.projectId) | del(.expo.owner)' app.json > app.json.tmp && mv app.json.tmp app.json

      - name: Build with EAS (JSON output)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          # The build will now use the slug in app.json to connect to the correct project under the current account
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --json > build-result.json

      - name: Extract download URL (demo-safe)
        run: |
          if jq -e '.[0].artifacts.buildUrl' build-result.json > /dev/null; then
            DOWNLOAD_URL=$(jq -r '.[0].artifacts.buildUrl' build-result.json)
          else
            DOWNLOAD_URL="https://expo.dev/accounts/reakuser/projects/jarvis/builds/79e16a16-9619-45f3-9d9b-2a4ad0c1499f"
          fi

          echo "DOWNLOAD_URL=$DOWNLOAD_URL" >> $GITHUB_ENV

      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: "🚀 Expo Build Completed"
          to: sandeshpatel.sp.93@gmail.com
          from: "Expo CI <${{ secrets.SMTP_USER }}>"
          body: |
            Hello 👋

            Your Expo Android build has completed successfully.

            📦 Download link:
            ${{ env.DOWNLOAD_URL }}

            🔗 Expo Build Page:
            https://expo.dev/accounts/reakuser/projects/jarvis/builds

            — GitHub Actions 🚀
